# pubspec.yaml
# 版本: V0.6.4
# 修改日期: 2026-04-10
# 修改目的: 修复YAML格式错误，移除无效的web配置
name: my_prediction_app
description: A prediction tracking application
version: 0.6.4+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ========== UI 组件 ==========
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  flutter_slidable: ^3.0.0
  percent_indicator: ^4.2.3
  cached_network_image: ^3.3.0
  table_calendar: ^3.0.10
  date_picker_timeline: ^1.2.6

  # URL处理
  url_launcher: ^6.2.1
  # 已移除：flutter_web_plugins: any

  # ========== 数据与状态管理 ==========
  supabase_flutter: ^2.12.2
  provider: ^6.1.1
  flutter_hooks: ^0.20.5
  uuid: ^4.3.0
  intl: ^0.19.0
  flutter_dotenv: ^5.2.1
  shared_preferences: ^2.2.2
  fl_chart: ^0.66.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env